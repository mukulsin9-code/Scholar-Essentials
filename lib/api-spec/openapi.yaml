openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Scholars Essentials API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profile
    description: Current user profile
  - name: items
    description: Books and student essentials marketplace listings
  - name: accommodations
    description: Paying Guest (PG) accommodation listings
  - name: locations
    description: Map endpoints
  - name: dashboard
    description: Dashboard summaries and aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /profile:
    get:
      tags: [profile]
      operationId: getProfile
      summary: Get my full profile (user_type, location, etc.)
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized
    put:
      tags: [profile]
      operationId: updateProfile
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized

  /items:
    get:
      tags: [items]
      operationId: listItems
      summary: List items (books / essentials) for sale
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: condition
          in: query
          required: false
          schema:
            type: string
            enum: [new, like_new, good, fair, used]
      responses:
        '200':
          description: List of items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      tags: [items]
      operationId: createItem
      summary: Create an item listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          description: Unauthorized
  /items/mine:
    get:
      tags: [items]
      operationId: listMyItems
      summary: List the current user's item listings
      responses:
        '200':
          description: Items owned by current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
        '401':
          description: Unauthorized
  /items/{id}:
    get:
      tags: [items]
      operationId: getItem
      summary: Get a single item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Not found.
    put:
      tags: [items]
      operationId: updateItem
      summary: Update one of your item listings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemBody'
      responses:
        '200':
          description: Updated item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      tags: [items]
      operationId: deleteItem
      summary: Delete one of your item listings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /accommodations:
    get:
      tags: [accommodations]
      operationId: listAccommodations
      summary: List PG accommodations
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: maxRent
          in: query
          required: false
          schema:
            type: number
      responses:
        '200':
          description: List of accommodations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Accommodation'
    post:
      tags: [accommodations]
      operationId: createAccommodation
      summary: Create a PG listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccommodationBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accommodation'
        '401':
          description: Unauthorized
  /accommodations/mine:
    get:
      tags: [accommodations]
      operationId: listMyAccommodations
      summary: List the current user's PG listings
      responses:
        '200':
          description: Accommodations owned by current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Accommodation'
        '401':
          description: Unauthorized
  /accommodations/{id}:
    get:
      tags: [accommodations]
      operationId: getAccommodation
      summary: Get a single PG
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Accommodation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accommodation'
        '404':
          description: Not found.
    put:
      tags: [accommodations]
      operationId: updateAccommodation
      summary: Update a PG listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccommodationBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accommodation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      tags: [accommodations]
      operationId: deleteAccommodation
      summary: Delete a PG listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /locations:
    get:
      tags: [locations]
      operationId: listLocations
      summary: Map data — all PG accommodations as map points
      responses:
        '200':
          description: Locations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MapLocation'

  /dashboard/summary:
    get:
      tags: [dashboard]
      operationId: getDashboardSummary
      summary: Aggregate counts and totals for the marketplace
      responses:
        '200':
          description: Summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
  /dashboard/recent-activity:
    get:
      tags: [dashboard]
      operationId: getRecentActivity
      summary: Recent items and PG listings across the marketplace
      responses:
        '200':
          description: Recent activity feed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityEntry'
  /dashboard/condition-breakdown:
    get:
      tags: [dashboard]
      operationId: getConditionBreakdown
      summary: Item count grouped by condition
      responses:
        '200':
          description: Condition breakdown.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConditionCount'
  /dashboard/rent-stats:
    get:
      tags: [dashboard]
      operationId: getRentStats
      summary: Aggregate PG rent statistics (min, max, average)
      responses:
        '200':
          description: Rent stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentStats'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Profile:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, userType, latitude, longitude, city]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        userType:
          type: string
          enum: [student, owner]
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
        city:
          type: [string, 'null']
    UpdateProfileBody:
      type: object
      properties:
        userType:
          type: string
          enum: [student, owner]
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
        city:
          type: [string, 'null']

    Item:
      type: object
      required: [id, sellerId, sellerName, title, description, price, condition, createdAt]
      properties:
        id:
          type: integer
        sellerId:
          type: string
        sellerName:
          type: [string, 'null']
        sellerEmail:
          type: [string, 'null']
        title:
          type: string
        description:
          type: string
        price:
          type: number
        condition:
          type: string
          enum: [new, like_new, good, fair, used]
        category:
          type: [string, 'null']
        imageUrl:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateItemBody:
      type: object
      required: [title, description, price, condition]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        condition:
          type: string
          enum: [new, like_new, good, fair, used]
        category:
          type: [string, 'null']
        imageUrl:
          type: [string, 'null']
    UpdateItemBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        condition:
          type: string
          enum: [new, like_new, good, fair, used]
        category:
          type: [string, 'null']
        imageUrl:
          type: [string, 'null']

    Accommodation:
      type: object
      required: [id, ownerId, ownerName, name, address, monthlyRent, latitude, longitude, createdAt]
      properties:
        id:
          type: integer
        ownerId:
          type: string
        ownerName:
          type: [string, 'null']
        ownerEmail:
          type: [string, 'null']
        name:
          type: string
        address:
          type: string
        description:
          type: [string, 'null']
        monthlyRent:
          type: number
        latitude:
          type: number
        longitude:
          type: number
        genderPreference:
          type: [string, 'null']
          enum: [any, male, female, null]
        amenities:
          type: array
          items:
            type: string
        imageUrl:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateAccommodationBody:
      type: object
      required: [name, address, monthlyRent, latitude, longitude]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        description:
          type: [string, 'null']
        monthlyRent:
          type: number
          minimum: 0
        latitude:
          type: number
        longitude:
          type: number
        genderPreference:
          type: [string, 'null']
          enum: [any, male, female, null]
        amenities:
          type: array
          items:
            type: string
        imageUrl:
          type: [string, 'null']
    UpdateAccommodationBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        description:
          type: [string, 'null']
        monthlyRent:
          type: number
          minimum: 0
        latitude:
          type: number
        longitude:
          type: number
        genderPreference:
          type: [string, 'null']
          enum: [any, male, female, null]
        amenities:
          type: array
          items:
            type: string
        imageUrl:
          type: [string, 'null']

    MapLocation:
      type: object
      required: [id, name, latitude, longitude, monthlyRent, address]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        monthlyRent:
          type: number
        imageUrl:
          type: [string, 'null']

    DashboardSummary:
      type: object
      required: [totalItems, totalAccommodations, totalUsers, averageItemPrice, averageMonthlyRent]
      properties:
        totalItems:
          type: integer
        totalAccommodations:
          type: integer
        totalUsers:
          type: integer
        averageItemPrice:
          type: number
        averageMonthlyRent:
          type: number
    ActivityEntry:
      type: object
      required: [id, kind, title, subtitle, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [item, accommodation]
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    ConditionCount:
      type: object
      required: [condition, count]
      properties:
        condition:
          type: string
        count:
          type: integer
    RentStats:
      type: object
      required: [min, max, avg, count]
      properties:
        min:
          type: number
        max:
          type: number
        avg:
          type: number
        count:
          type: integer
